nelmio_api_doc:
    documentation:
        info:
            title: MedCard API
            description: REST API for managing medical records
            version: 1.0.0
        components:
            securitySchemes:
                BearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - BearerAuth: []   # applied globally; public endpoints override with security: []
    areas:
        path_patterns:
            - ^/api(?!/doc)    # include all /api/* but exclude /api/doc itself
